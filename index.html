<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEBADA COCINA</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f8f7f2;
    margin:0;
    padding:20px;
    color:#333;
}
.container{
    max-width:850px;
    margin:auto;
}
h1{
    text-align:center;
    font-size:48px;
    margin-bottom:8px;
    letter-spacing:2px;
}
.subtitle{
    text-align:center;
    color:#6a6a6a;
    margin-bottom:30px;
}
.accordion{
    background:#6d7d63;
    color:white;
    cursor:pointer;
    padding:18px;
    width:100%;
    border:none;
    text-align:center;
    font-size:20px;
    border-radius:12px;
    margin-bottom:12px;
}
.panel{
    display:none;
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
    border:1px solid #d8ded2;
}
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #eee;
}
.item:last-child{
    border:none;
}
h3{
    margin-top:20px;
    color:#556b55;
}
.total-box{
    position:relative;
    background:#eef3ea;
    border:1px solid #c4d0bc;
    padding:20px;
    border-radius:16px;
    margin-top:30px;
    margin-bottom:40px;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
#shippingMessage{
    margin-top:12px;
    padding:14px;
    background:#dfe9d8;
    color:#556b55;
    border-radius:10px;
    font-weight:bold;
}
.payment-note{
    margin-top:10px;
    padding:12px;
    background:#f3f6ef;
    border:1px solid #cfd8c7;
    border-radius:10px;
    color:#556b55;
    font-size:14px;
    line-height:1.4;
}
.btn{
    background:#556b55;
    color:white;
    border:none;
    width:100%;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}
</style>
</head>
<body>
<div class="container">
    <h1>CEBADA COCINA</h1>
    <div class="subtitle">Producción diaria · pedidos programados</div>

    <div id="products"></div>

    <div class="total-box">
        <h2>Total: $<span id="total">0</span></h2>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="text" id="telefono" placeholder="Número de teléfono">

        <select id="zona" onchange="updateShipping()">
            <option value="">Seleccionar zona</option>
            <option value="15000">Luis Guillón / Lavallol / Malvinas / Loma Verde</option>
            <option value="18000">Turdera / Monte Grande / Adrogué</option>
            <option value="24000">El Jagüel / Temperley / Burzaco</option>
            <option value="30000">Lomas / Banfield / Mármol</option>
            <option value="35000">Longchamps / Glew / Escalada</option>
        </select>

        <div id="shippingMessage"></div>

        <select id="pago">
            <option value="">Forma de pago</option>
            <option>Transferencia 100%</option>
            <option>50% transferencia + saldo en efectivo</option>
        </select>

        <div class="payment-note">
            Reserva tu producción con el 50% por transferencia.
            El saldo puede abonarse en efectivo al recibir.
        </div>

        <button class="btn" onclick="sendWhatsApp()">Enviar pedido por WhatsApp</button>
    </div>
</div>

<script>
const whatsapp = "5491122897108";
const productsDiv = document.getElementById("products");

const catalog = {
    "EMPRESAS Y EVENTOS": {
        "Coffee Break": [
            ["20 medialunas", 26000],
            ["40 medialunas", 50000],
            ["60 medialunas", 72000]
        ],
        "Cookies Evento": [
            ["50 minis surtidas", 52000],
            ["100 minis surtidas", 98000]
        ],
        "Alfajores Box": [
            ["20 alfajores surtidos", 38000],
            ["40 alfajores surtidos", 74000]
        ]
    },

    "MEDIALUNAS": {
        "Opciones": [
            ["Media docena", 8000],
            ["1 docena", 15000],
            ["2 docenas", 29000],
            ["3 docenas", 43000],
            ["4 docenas", 56000],
            ["5 docenas", 69000],
            ["6 docenas", 82000]
        ]
    },

    "COOKIES": {
        "Choco Nuez": [
            ["12 minis", 13000],
            ["24 minis", 25000],
            ["36 minis", 36000],
            ["6 grandes", 13000],
            ["12 grandes", 25000],
            ["18 grandes", 36000]
        ],
        "Choco Maní": [
            ["12 minis", 13000],
            ["24 minis", 25000],
            ["36 minis", 36000],
            ["6 grandes", 13000],
            ["12 grandes", 25000],
            ["18 grandes", 36000]
        ],
        "Triple Chocolate": [
            ["12 minis", 13000],
            ["24 minis", 25000],
            ["36 minis", 36000],
            ["6 grandes", 13000],
            ["12 grandes", 25000],
            ["18 grandes", 36000]
        ]
    },

    "ALFAJORES": {
        "Maicena": [],
        "Chocolate": [],
        "Glaseado": []
    },

    "GRANOLA": {
        "Opciones": []
    },

    "CHIPACITOS": {
        "Opciones": []
    },

    "PANIFICADOS": {
        "Opciones": [
            ["Pan semi integral", 7000],
            ["2 unidades", 14000],
            ["1 cortado", 7500],
            ["2 cortado", 15000],
            ["Centeno", 9000],
            ["2 centeno", 18000],
            ["Centeno cortado", 9500],
            ["2 centeno cortado", 19000],
            ["Pepas 250gr", 5000],
            ["Pepas x2", 10000],
            ["Matera x12 surtida", 14000],
            ["Matera surtida x2", 28000]
        ]
    }
};

const alfajorPrices = [2000, 4000, 6000, 8000, 10000, 12000, 13800, 15600, 17300, 19000, 20700, 22400];

["Maicena", "Chocolate", "Glaseado"].forEach(tipo => {
    catalog["ALFAJORES"][tipo] = [];

    for (let i = 1; i <= 12; i++) {
        catalog["ALFAJORES"][tipo].push([
            `${i} unidades`,
            alfajorPrices[i - 1]
        ]);
    }
});

for (let i = 1; i <= 5; i++) {
    catalog["GRANOLA"]["Opciones"].push([`${i} bolsa 300gr`, i * 8500]);
}

for (let i = 1; i <= 4; i++) {
    catalog["CHIPACITOS"]["Opciones"].push([`${i * 15} unidades`, i * 14000]);
}

let selected = {};

function renderProducts() {
    productsDiv.innerHTML = "";

    for (let mainCat in catalog) {
        const mainButton = document.createElement("button");
        mainButton.className = "accordion";
        mainButton.innerText = mainCat;

        const mainPanel = document.createElement("div");
        mainPanel.className = "panel";

        mainButton.addEventListener("click", () => {
            mainPanel.style.display =
                mainPanel.style.display === "block" ? "none" : "block";
        });

        for (let subCat in catalog[mainCat]) {
            const subTitle = document.createElement("h3");
            subTitle.innerText = subCat;
            mainPanel.appendChild(subTitle);

            catalog[mainCat][subCat].forEach(item => {
                const row = document.createElement("div");
                row.className = "item";

                const label = document.createElement("label");
                let extra = "";

if (
    item[0].includes("36 minis") ||
    item[0].includes("18 grandes") ||
    item[0].includes("12 unidades")
) {
    extra = " ⭐ Mejor precio";
}

label.textContent = `${item[0]} - $${item[1]}${extra}`;

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.style.width = "auto";

                checkbox.addEventListener("change", function () {
                    toggleItem(`${mainCat} - ${subCat}`, item[0], item[1], this.checked);
                });

                row.appendChild(label);
                row.appendChild(checkbox);
                mainPanel.appendChild(row);
            });
        }

        productsDiv.appendChild(mainButton);
        productsDiv.appendChild(mainPanel);
    }
}

function toggleItem(cat, name, price, checked) {
    const key = `${cat} - ${name}`;
    if (checked) {
        selected[key] = price;
    } else {
        delete selected[key];
    }
    updateTotal();
}

function updateTotal() {
    const total = Object.values(selected).reduce((a, b) => a + b, 0);
    document.getElementById("total").innerText = total;
    updateShipping();
}

function updateShipping() {
    const total = Object.values(selected).reduce((a, b) => a + b, 0);
    const min = Number(document.getElementById("zona").value);
    const msg = document.getElementById("shippingMessage");

    if (!min) {
        msg.innerText = "";
        return;
    }

    if (total >= min) {
        msg.innerText = "✅ ¡Ya tenés envío gratis!";
    } else {
        msg.innerText = `Te faltan $${min - total} para envío gratis`;
    }
}

function sendWhatsApp() {
    const pedido = Object.keys(selected).map(x => "• " + x).join("%0A");
    const nombre = document.getElementById("nombre").value;
    const direccion = document.getElementById("direccion").value;
    const telefono = document.getElementById("telefono").value;
    const zona = document.getElementById("zona").selectedOptions[0].text;
    const pago = document.getElementById("pago").value;
    const total = Object.values(selected).reduce((a, b) => a + b, 0);

    const msg = `Hola! Quiero hacer este pedido:%0A%0A${pedido}%0A%0ATotal: $${total}%0A%0ANombre: ${nombre}%0ADirección: ${direccion}%0ATeléfono: ${telefono}%0AZona: ${zona}%0APago: ${pago}%0ASeña mínima: 50% por transferencia`;

    window.open(`https://wa.me/${whatsapp}?text=${msg}`, "_blank");
}

renderProducts();
</script>
</body>
</html>
