<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CEBADA COCINA</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  background: #ffffff;
  padding: 20px;
}

h1 {
  text-align: center;
}

.box {
  background: #f7f7f7;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

select, input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: black;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#resumenPedido {
  background:#e8f3ec;
  border:2px solid #8fbfa3;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  font-weight:600;
  color:#2f5d50;
}
</style>

</head>

<body>

<h1>CEBADA COCINA</h1>

<div class="box">
<h3>Medialunas</h3>
<select id="medialunas" onchange="calcularTotal()">
<option value="0">Seleccionar</option>
<option value="8000">Media docena - $8.000</option>
<option value="15000">1 docena - $15.000</option>
<option value="30000">2 docenas - $30.000</option>
<option value="45000">3 docenas - $45.000</option>
<option value="60000">4 docenas - $60.000</option>
<option value="75000">5 docenas - $75.000</option>
<option value="90000">6 docenas - $90.000</option>
</select>
</div>

<div class="box">
<h3>Cookies</h3>
<select id="cookies" onchange="calcularTotal()">
<option value="0">Seleccionar</option>
<option value="13000">6 grandes - $13.000</option>
<option value="26000">12 grandes - $26.000</option>
<option value="39000">18 grandes - $39.000</option>
<option value="13000">12 minis - $13.000</option>
<option value="26000">24 minis - $26.000</option>
<option value="39000">36 minis - $39.000</option>
</select>
</div>

<div class="box">
<h3>Alfajores</h3>
<select id="alfajores" onchange="calcularTotal()">
<option value="0">Seleccionar</option>
<option value="2000">1 unidad - $2.000</option>
<option value="4000">2 unidades - $4.000</option>
<option value="6000">3 unidades - $6.000</option>
<option value="10000">5 unidades - $10.000</option>
<option value="20000">10 unidades - $20.000</option>
<option value="6000">Caja 8 chicos - $6.000</option>
</select>
</div>

<div class="box">
<h3>Granola</h3>
<select id="granola" onchange="calcularTotal()">
<option value="0">Seleccionar</option>
<option value="8500">Bolsa 300g - $8.500</option>
<option value="17000">2 unidades - $17.000</option>
<option value="25500">3 unidades - $25.500</option>
</select>
</div>

<div class="box">
<h3>Panificados</h3>
<select id="pan" onchange="calcularTotal()">
<option value="0">Seleccionar</option>
<option value="7000">Pan integral - $7.000</option>
<option value="7500">Pan integral cortado - $7.500</option>
<option value="9000">Pan centeno - $9.000</option>
<option value="9500">Pan centeno cortado - $9.500</option>
<option value="14000">Chipá x15 - $14.000</option>
<option value="30000">Chipá x30 - $30.000</option>
<option value="42000">Chipá x45 - $42.000</option>
</select>
</div>
  
</div>
<input id="nombre" placeholder="Nombre">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">
<select id="pago">
  <option value="">Método de pago</option>
  <option>Transferencia (seña 50% para confirmar)</option>
  <option>Efectivo</option>
</select>

<button onclick="enviarPedido()">CONFIRMAR PEDIDO</button>

<script>

function calcularTotal() {

let total = 0;

total += Number(document.getElementById("medialunas").value);
total += Number(document.getElementById("cookies").value);
total += Number(document.getElementById("alfajores").value);
total += Number(document.getElementById("granola").value);
total += Number(document.getElementById("pan").value);

let zona = Number(document.getElementById("zona").value);

let texto = "Total: $" + total;

if (zona > 0) {
  let falta = zona - total;

  if (falta > 0) {
    texto += " | Te faltan $" + falta + " para envío gratis";
  } else {
    texto += " | 🚚 Envío GRATIS";
  }
}

document.getElementById("resumenPedido").innerText = texto;

}

function enviarPedido() {
let mensaje = "🧾 *PEDIDO CEBADA COCINA*%0A%0A";
let nombre = document.getElementById("nombre").value;
let direccion = document.getElementById("direccion").value;
let telefono = document.getElementById("telefono").value;
let pago = document.getElementById("pago").value;

mensaje += "🧾 Pedido:%0A";

let med = document.getElementById("medialunas");
if (med.value != "0") {
  mensaje += "🥐 " + med.options[med.selectedIndex].text + "%0A";
}

let cookies = document.getElementById("cookies");
if (cookies.value != "0") {
  mensaje += "🍪 " + cookies.options[cookies.selectedIndex].text + "%0A";
}

let alfa = document.getElementById("alfajores");
if (alfa.value != "0") {
  mensaje += " Alfajores: " + alfa.options[alfa.selectedIndex].text + "%0A";
}

let granola = document.getElementById("granola");
if (granola.value != "0") {
  mensaje += "🥣 " + granola.options[granola.selectedIndex].text + "%0A";
}

let pan = document.getElementById("pan");
if (pan.value != "0") {
  mensaje += "🍞 " + pan.options[pan.selectedIndex].text + "%0A";
}
// DATOS CLIENTE
mensaje += "%0A👤 Nombre: " + nombre + "%0A";
mensaje += "📍 Dirección: " + direccion + "%0A";
mensaje += "📞 Teléfono: " + telefono + "%0A";

// PAGO
if (pago) {
  mensaje += "💳 Pago: " + pago + "%0A";
}
mensaje += "%0A💳 Condición:%0AReserva con 50% por transferencia.%0A";

window.open("https://wa.me/5491122897108?text=" + mensaje);

}

</script>

</body>
</html>
