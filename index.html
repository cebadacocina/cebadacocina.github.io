<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cebada Cocina</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f0f2;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h1>CEBADA COCINA</h1>

<div class="box">
  <h3>Medialunas</h3>
  <select id="medialunas">
    <option value="">Seleccionar</option>
    <option>Media docena</option>
    <option>Docena</option>
    <option>2 docenas</option>
  </select>
</div>

<div class="box">
  <h3>Cookies</h3>
  <select id="cookies">
    <option value="">Seleccionar</option>
    <option>Pack x6</option>
    <option>Pack x12</option>
  </select>
</div>

<div class="box">
  <h3>Alfajores</h3>
  <select id="alfajores">
    <option value="">Seleccionar</option>
    <option>Pack x6</option>
  </select>
</div>

<div class="box">
  <h3>Datos</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="direccion" placeholder="Dirección">
  <input id="telefono" placeholder="Teléfono">
</div>

<button onclick="enviarPedido()">ENVIAR PEDIDO</button>

<script>
function enviarPedido() {
  let mensaje = "Hola! Quiero pedir:%0A";

  let med = document.getElementById("medialunas").value;
  let cook = document.getElementById("cookies").value;
  let alfa = document.getElementById("alfajores").value;

  if (med) mensaje += "- Medialunas: " + med + "%0A";
  if (cook) mensaje += "- Cookies: " + cook + "%0A";
  if (alfa) mensaje += "- Alfajores: " + alfa + "%0A";

  let nombre = document.getElementById("nombre").value;
  let direccion = document.getElementById("direccion").value;
  let telefono = document.getElementById("telefono").value;

  mensaje += "%0A";
  mensaje += "Nombre: " + nombre + "%0A";
  mensaje += "Dirección: " + direccion + "%0A";
  mensaje += "Teléfono: " + telefono;

  window.open("https://wa.me/549TU_NUMERO?text=" + mensaje);
}
</script>

</body>
</html>
